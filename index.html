<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<link
			href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
			rel="stylesheet"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@0.6.4/dist/maplibre-gl-terradraw.css"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@500;800&display=swap"
			rel="stylesheet"
		/>
		<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@0.6.4/dist/maplibre-gl-terradraw.umd.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
		<script type="module" src="app.js" defer></script>
		<title>Osijek - interaktivna karta</title>
	</head>
	<body>
		<header class="header">
			<img
				src="./icons/map-logo.svg"
				alt="Biciklističke staze grada Osijeka logo"
				class="main-logo"
				width="135"
				height="auto"
			/>
			<h4 class="title">Biciklističke staze grada Osijeka</h4>
			<div class="logo-container">
				<img
					src="./icons/grad-logo.svg"
					alt="Grada Osijek logo"
					class="city-logo"
					height="80"
					width="auto"
				/>
				<img
					src="./icons/sustainable-logo.svg"
					alt="Održivi urbani razvoj - ITU logo"
					class="sustainable-logo"
					height="80"
					width="auto"
				/>
				<img
					src="./icons/eu-finance-logo.svg"
					alt="Sufinacira Europska unija logo"
					class="eu-logo"
					height="40"
					width="auto"
				/>
			</div>
		</header>
		<div id="sidebar" class="sidebar">
			<div class="heading">
				<button id="close">
					<svg
						width="20px"
						height="20px"
						viewBox="0 0 24 24"
						xmlns="http://www.w3.org/2000/svg"
						stroke="#FFFFFF"
						stroke-width="2"
					>
						<path
							d="M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12ZM8.96963 8.96965C9.26252 8.67676 9.73739 8.67676 10.0303 8.96965L12 10.9393L13.9696 8.96967C14.2625 8.67678 14.7374 8.67678 15.0303 8.96967C15.3232 9.26256 15.3232 9.73744 15.0303 10.0303L13.0606 12L15.0303 13.9696C15.3232 14.2625 15.3232 14.7374 15.0303 15.0303C14.7374 15.3232 14.2625 15.3232 13.9696 15.0303L12 13.0607L10.0303 15.0303C9.73742 15.3232 9.26254 15.3232 8.96965 15.0303C8.67676 14.7374 8.67676 14.2625 8.96965 13.9697L10.9393 12L8.96963 10.0303C8.67673 9.73742 8.67673 9.26254 8.96963 8.96965Z"
							fill="#7690c9"
						/>
					</svg>
				</button>
				<h3>Informacije o stazi</h3>
			</div>
			<div id="sidebar-content"></div>
		</div>
		<div id="map" style="width: 100%; height: 100vh"></div>
	</body>
</html>
